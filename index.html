<!DOCTYPE html>
<html>
<head>
    <title>Responsive Hero Page</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px;
            background-color: #f4f6f8;
        }

        .hero-text {
            max-width: 500px;
        }

        .hero-text h1 {
            font-size: 40px;
            color: #2c3e50;
        }

        .hero-text p {
            font-size: 18px;
            margin: 20px 0;
        }

        .hero-text a {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        .hero-text a:hover {
            background-color: #2c80b4;
        }

        .hero img {
            width: 350px;
            border-radius: 10px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .hero img {
                width: 250px;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="hero-text">
            <h1>Welcome to My Website</h1>
            <p>This is a responsive hero section built using Flexbox.</p>
            <a href="#">Get Started</a>
        </div>

        <div>
            <img src="hero.jpg" alt="Hero Image">
        </div>
    </section>

</body>
</html>
