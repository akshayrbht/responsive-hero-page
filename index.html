        h1 {
            text-align: center;
            color: #2c3e50;

        h2 {
            color: #1e8449;

        img {
            border: 4px solid #1e8449;

            padding: 5px;
        }

        ul, ol {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }

        a {
            background-color: #1e8449;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #145a32;
        }
